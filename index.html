<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bharat Matka App - Download Now</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            padding: 50px;
            max-width: 600px;
            width: 90%;
            text-align: center;
            animation: slideUp 0.8s ease-in-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            font-size: 60px;
            margin-bottom: 20px;
        }

        h1 {
            color: #333;
            font-size: 42px;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .subtitle {
            color: #666;
            font-size: 18px;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .features {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 10px;
            margin: 30px 0;
            text-align: left;
        }

        .features h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 20px;
        }

        .feature-item {
            color: #555;
            padding: 8px 0;
            font-size: 16px;
            display: flex;
            align-items: center;
        }

        .feature-item:before {
            content: "✓";
            color: #667eea;
            font-weight: bold;
            margin-right: 10px;
            font-size: 18px;
        }

        .download-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 18px 50px;
            font-size: 18px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.3s, box-shadow 0.3s;
            margin-top: 20px;
            text-decoration: none;
            display: inline-block;
        }

        .download-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .download-btn:active {
            transform: translateY(-1px);
        }

        .footer {
            margin-top: 30px;
            color: #999;
            font-size: 14px;
        }

        .app-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 50px;
            color: white;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px;
            }

            h1 {
                font-size: 32px;
            }

            .subtitle {
                font-size: 16px;
            }

            .download-btn {
                padding: 15px 40px;
                font-size: 16px;
            }

            .app-icon {
                width: 80px;
                height: 80px;
                font-size: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="app-icon">📱</div>
        
        <h1>Bharat Matka App</h1>
        
        <p class="subtitle">
            आपका विश्वसनीय और सुरक्षित Matka खेलने का प्लेटफॉर्म
        </p>

        <div class="features">
            <h3>मुख्य विशेषताएं:</h3>
            <div class="feature-item">तेज़ और सुरक्षित लेनदेन</div>
            <div class="feature-item">24/7 ग्राहक सहायता</div>
            <div class="feature-item">सर्वश्रेष्ठ दर और अवसर</div>
            <div class="feature-item">आसान और सरल इंटरफेस</div>
            <div class="feature-item">तुरंत निकासी सुविधा</div>
        </div>

        <a href="https://bharatonlinematkaplay.matkaverse.in" class="download-btn" target="_blank">
            📥 अभी App Download करें
        </a>

        <p class="footer">
            <strong>नोट:</strong> 18+ के लिए। ज़िम्मेदारी से खेलें।
        </p>
    </div>
</body>
</html>
